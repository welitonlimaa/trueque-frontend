<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- círculo da economia circular -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#2e7d32" stroke-width="6"/>

  <!-- setas de troca -->
  <path d="M40 100 A60 60 0 0 1 100 40" fill="none" stroke="#2e7d32" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M100 160 A60 60 0 0 1 160 100" fill="none" stroke="#2e7d32" stroke-width="6" marker-end="url(#arrow)"/>

  <!-- folha de sustentabilidade -->
  <path d="M100 70 C120 60,140 80,100 110 C60 80,80 60,100 70" fill="#4caf50"/>

  <!-- definição da seta -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2e7d32"/>
    </marker>
  </defs>

</svg>